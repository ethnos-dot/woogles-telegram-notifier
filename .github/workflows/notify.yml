name: woogles-telegram-notifier

on:
  schedule:
    # Every 5 minutes. This needs UNLIMITED Actions minutes, which you only get
    # on a PUBLIC repo. On a private repo this would exhaust the ~2,000 free
    # minutes/month in about a week -- bump to "*/30 * * * *" if you go private.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you run it manually from the Actions tab

# Allow the job to commit the updated state.json back to the repo.
permissions:
  contents: write

# Never let two runs race on the state commit.
concurrency:
  group: woogles-notifier
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check Woogles and notify
        env:
          WOOGLES_USERNAME: ${{ secrets.WOOGLES_USERNAME }}
          WOOGLES_PASSWORD: ${{ secrets.WOOGLES_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python woogles_notify.py --once

      - name: Persist state
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update notifier state [skip ci]"
            git push
          else
            echo "No state change."
          fi
