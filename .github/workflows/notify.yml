name: woogles-telegram-notifier

on:
  schedule:
    # Every 10 minutes. Public repos get unlimited Actions minutes, so this is
    # free. On a private repo, even 10-min exceeds the ~2,000 free minutes/month
    # -- use "*/30 * * * *" if you switch to private.
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # manual runs + lets an external cron (cron-job.org) trigger it

# State lives in the Actions cache, not committed to the repo, so read-only is enough.
permissions:
  contents: read

# Never let two runs race on the state cache.
concurrency:
  group: woogles-notifier
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Restore the most recent saved state (turn / finished / analysis memory).
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: notifier-state-${{ github.run_id }}
          restore-keys: |
            notifier-state-

      - name: Check Woogles and notify
        env:
          WOOGLES_USERNAME: ${{ secrets.WOOGLES_USERNAME }}
          WOOGLES_PASSWORD: ${{ secrets.WOOGLES_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python woogles_notify.py --once

      # Save the updated state for the next run (unique key + prefix restore-keys
      # is the standard pattern, since cache entries are immutable per key).
      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: notifier-state-${{ github.run_id }}
